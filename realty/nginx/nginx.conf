user nginx;
worker_processes auto;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  client_max_body_size 60M;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript image/svg+xml;
  gzip_min_length 1024;

  # ─── HTTP → HTTPS (uncomment after issuing cert) ───
  # server {
  #   listen 80;
  #   server_name your-domain.com;
  #   location /.well-known/acme-challenge/ { root /var/www/certbot; }
  #   location / { return 301 https://$host$request_uri; }
  # }

  server {
    listen 80 default_server;
    server_name _;

    # API
    location /api/ {
      proxy_pass http://api:3001/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static uploaded photos (served by API container, but mounted shared volume)
    location /uploads/ {
      alias /app/uploads/;
      add_header Cache-Control "public, max-age=2592000, immutable";
      access_log off;
    }

    # Frontend SPA
    location / {
      proxy_pass http://frontend:80/;
      proxy_set_header Host $host;
    }
  }

  # ─── HTTPS server (enable after obtaining cert via certbot) ───
  # server {
  #   listen 443 ssl http2;
  #   server_name your-domain.com;
  #   ssl_certificate     /etc/nginx/certs/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/certs/privkey.pem;
  #
  #   location /api/      { proxy_pass http://api:3001/api/; proxy_set_header Host $host; }
  #   location /uploads/  { alias /app/uploads/; }
  #   location /          { proxy_pass http://frontend:80/; proxy_set_header Host $host; }
  # }
}
